# Alembic 設定ファイル。
#
# script_location はマイグレーション本体（env.py・versions/）の場所。
# sqlalchemy.url は「空」にしておき、実際の接続先は env.py で環境変数
# DATABASE_URL から読む（秘匿値を設定ファイルに書かないため）。

[alembic]
# マイグレーションスクリプトの置き場（このiniからの相対パス）
script_location = app/db/migrations

# バージョンファイル名のテンプレート（先頭に連番、続けて説明スラグ）
# 例: 0001_initial.py
# file_template = %%(rev)s_%%(slug)s

# 接続URLは env.py で DATABASE_URL から注入するため、ここは空にする。
sqlalchemy.url =


# ---- ロギング設定 ----
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
